name: Release

on:
  release:
    types: [published]

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload atlas.py to release
        uses: softprops/action-gh-release@v2
        with:
          files: atlas.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
